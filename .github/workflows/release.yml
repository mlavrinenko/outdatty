name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  BINARY_NAME: "" # set dynamically in the 'name' step

jobs:
  name:
    name: Detect binary name
    runs-on: ubuntu-latest
    outputs:
      binary: ${{ steps.meta.outputs.binary }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          name=$(sed -n 's/^name = "\(.*\)"/\1/p' Cargo.toml | head -1)
          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          echo "binary=$name" >> "$GITHUB_OUTPUT"
          # Guard: the pushed tag must match the Cargo.toml version, otherwise
          # `cargo publish` would ship a different version than the tag implies.
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $version"
            exit 1
          fi

  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check
        run: nix develop --command just check

  build:
    name: Build (${{ matrix.target }})
    needs: [check, name]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ needs.name.outputs.binary }} ${{ needs.name.outputs.binary }}-${{ matrix.target }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ needs.name.outputs.binary }}.exe ${{ needs.name.outputs.binary }}-${{ matrix.target }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.name.outputs.binary }}-${{ matrix.target }}
          path: ${{ needs.name.outputs.binary }}-${{ matrix.target }}*

  publish:
    name: Publish to crates.io
    needs: [check, name]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    needs: [name, build, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ needs.name.outputs.binary }}-*
