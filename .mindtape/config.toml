# .mindtape/config.toml — per-project MindTape configuration.
# White-listed: MindTape constrains only what is declared here. Omit a section
# to accept the defaults and the prelude's full status shortcut set.

[tasks]
# Directories (relative to this file's project root) holding one task per file.
# Shorthand `roots = ["tasks"]`, or the table form for a display name and
# folder-derived tags:
#   [[tasks.roots]]
#   path = "tasks"
#   name = "mt"            # tag emitted for the root (defaults to the last segment)
#   derive-tags = true     # true | false | "glob" | ["glob", …] (gates which files)
roots = ["tasks"]

# Folder-derived tags: tasks inherit tags from their location under a root, so
# nested trees need no hand-wired tags. Off by default; enable per root above or
# project-wide here. Derived tags are virtual (never written) and validated
# against `[tasks.tags] allowed` like authored ones.
#   [tasks.derive-tags]
#   enabled = true                        # default for roots that set no derive-tags
#   collect = ["segments", "breadcrumbs"] # backend, auth / backend, backend:auth
#   separator = ":"                       # breadcrumb join char
#   slugify = true                        # normalise folder names to tag form
#   breadcrumb-root = false               # fold root name into the chain (mt:backend)

# Status legend: legal values in lifecycle order, each with an optional glyph and
# colour. `terminal = true` ends a task (required fields relax once terminal).
[[tasks.status]]
value = "proposed"
glyph = "💡"
color = "blue"

[[tasks.status]]
value = "accepted"
glyph = "📋"
color = "cyan"

[[tasks.status]]
value = "wip"
glyph = "🔨"
color = "yellow"

[[tasks.status]]
value = "done"
glyph = "✅"
color = "green"
terminal = true

[[tasks.status]]
value = "cancelled"
glyph = "🚫"
color = "magenta"
terminal = true

[[tasks.status]]
value = "failed"
glyph = "❌"
color = "red"
terminal = true

# Priority: a number on a scale, classified into labelled bands. `kind` is
# `int` | `real`; bands tile [min, max] (int: inclusive and contiguous).
# `required` is true | false | "non-terminal".
#
# To compute the score from a framework instead of a hand-set int, set
# `framework` to a built-in (ice/rice/wsjf/eisenhower/moscow) — tasks then write
# `priority: ice(impact: 8, confidence: 0.9, ease: 7)`. `allow-manual = false`
# forbids raw ints. Define or override one under `[tasks.priority.frameworks.<name>]`.
#   framework = "ice"
#   allow-manual = true
[tasks.priority]
kind = "int"
min = 0
max = 9
required = "non-terminal"
[[tasks.priority.bands]]
label = "low"
min = 0
max = 2
glyph = "🟢"
color = "green"
[[tasks.priority.bands]]
label = "normal"
min = 3
max = 6
glyph = "🟡"
color = "yellow"
[[tasks.priority.bands]]
label = "high"
min = 7
max = 9
glyph = "🔴"
color = "red"

# Difficulty: a number on a scale, classified by sparse labelled anchors. A
# value between anchors derives `lower-label + "+"`; an anchor at `min` is
# required. The difficulty→model-tier mapping is a consumer (speconaut) policy.
[tasks.difficulty]
kind = "int"
min = 0
max = 9
[[tasks.difficulty.anchors]]
value = 0
label = "junior"
glyph = "🟢"
color = "green"
[[tasks.difficulty.anchors]]
value = 3
label = "mid"
glyph = "🔵"
color = "cyan"
[[tasks.difficulty.anchors]]
value = 6
label = "senior"
glyph = "🟡"
color = "yellow"
[[tasks.difficulty.anchors]]
value = 9
label = "staff"
glyph = "🔴"
color = "red"

# Allowed estimate units. An estimate is an opaque unit dict, e.g.
# `estimate: (days: 5, hours: 5)` or `estimate: (points: 8)`. Units are free
# labels — never converted or compared. Omit this section to accept any unit.
[tasks.estimate]
units = ["minutes", "hours", "days", "weeks"]

[ls]
# Filter applied by `mt ls` when the caller passes none.
default-filter = "!terminal && (miss(start) || start <= now())"

# Global date display format applied to every rendered date column.
# Tokens (longest-match-first):
#   YYYY  — 4-digit year         YY    — 2-digit year
#   MMMM  — full month name      MMM   — abbreviated month (Jan … Dec)
#   MM    — zero-padded month    M     — bare month
#   DD    — zero-padded day      D     — bare day
# Non-token characters pass through literally.
# Default (unset) renders ISO YYYY-MM-DD.
# Example: date-format = "DD.MM.YYYY"  →  27.06.2026

# Column order and selection. Names: "#", "status", "ready", "priority", "due",
# "title". Unset = the built-in order. When set, it both selects and orders:
# only the listed columns render, in this sequence.
#   columns-order = ["#", "status", "priority", "due", "title"]

# Per-column display. `visibility` is auto | visible | hidden:
#   auto    — render only when the column carries something (the default). An
#             all-empty PRIORITY / DUE / STATUS drops; READY shows only when a
#             task is blocked. This is why empty columns vanish out of the box.
#   visible — always render, even when every cell is blank.
#   hidden  — never render, even when populated.
# Precedence: columns-order picks the set + order; visibility then decides
# whether each listed column actually renders. A column absent from
# columns-order never renders even with visibility = "visible".
#   [ls.columns.priority]
#   visibility = "visible"

[rm]
# Tasks a bare `mt rm` (no ref/filter argument) retires. Default sweeps
# every terminal-status task. An explicit ref or filter argument overrides it.
default-filter = "terminal"

# [add] — interactive editor fill for `mt add --edit`.
# `editor` overrides the ladder ($VISUAL → $EDITOR → vi). `interactive` is
# `auto` (open when a required slot is unfilled) | `always` | `never`. `header`
# overrides the scaffold's instruction block: set your own text (auto
# comment-prefixed), or "" to drop the header entirely.
#   [add]
#   editor = "nvim"
#   interactive = "auto"
#   header = "Fill the task below."

# [go] — editor `mt go <task>` opens a task file in.
# A `{task}` token is replaced with the resolved path; without it the path is
# appended. Resolution: `[go] editor` → $VISUAL → $EDITOR, then error (no `vi`
# floor).
#   [go]
#   editor = "zeditor {task}"

# [typst] — Typst package resolution.
# `@local/mindtape` resolves automatically: from `<root>/lib` when that directory
# is the mindtape package (in-tree development), otherwise from the installed
# local-package store (run `mt install-lib` once to put it there). To use
# MindTape inside another tool's worktree whose `lib/` is a different package,
# install the mindtape Typst package into the store, or register extra `@local/<name>` packages
# from an in-tree path so a task file can import a helper without a global
# install:
#   [[typst.local-packages]]
#   name = "speconaut"   # the @local/<name> a task file imports
#   path = "lib"         # dir holding that package's typst.toml, relative to root
