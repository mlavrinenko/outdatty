# yaml-language-server: $schema=./schema/outdatty.schema.json

# outdatty gating its own repository. When a source below changes, `check`
# fails until the listed dependents are re-confirmed with `outdatty update`.
groups:
  # The manifest types are the source of truth for the JSON schema and the
  # example manifest; both must track changes to them.
  - name: schema
    source:
      - src/manifest.rs
    dependents:
      - schema/outdatty.schema.json
      - examples/outdatty.yaml

  # The CLI surface (subcommands, flags, exit codes), the rendered output shown
  # in the docs, the install methods, and the usage skill are documented by
  # hand; editing any of them flags the docs as needing review.
  - name: cli-docs
    source:
      - src/cli.rs
      - src/commands.rs
      - src/report.rs
      - flake.nix
    dependents:
      - README.md
      - www/index.html
      - skills/outdatty/SKILL.md

  # A package change should be reflected in the changelog.
  - name: release-notes
    source:
      - Cargo.toml
    dependents:
      - CHANGELOG.md
