# yaml-language-server: $schema=./schema/outdatty.schema.json

# outdatty gating its own repository. When a source below changes, `check`
# fails until the listed dependents are re-confirmed with `outdatty update`.

# Coverage: every git-tracked file must belong to a group below, so a brand-new
# file cannot slip in untracked. Files with no meaningful coupling are excluded
# here; the manifest and lockfile are always exempt. Last match wins.
require_tracked:
  - "**"
  - "!tasks/**"
  - "!.mindtape/**"
  - "!AGENTS.md"
  - "!CLAUDE.md"
  - "!LICENSE-MIT"
  - "!.envrc"
  - "!.gitignore"

groups:
  # The manifest types are the source of truth for the JSON schema and the
  # example manifest; both must track changes to them.
  - name: schema
    source:
      - src/manifest.rs
    dependents:
      - schema/outdatty.schema.json
      - examples/outdatty.yaml

  # The CLI surface (subcommands, flags, exit codes), the rendered output shown
  # in the docs, the install methods, and the usage skill are documented by
  # hand; editing any of them flags the docs as needing review.
  - name: cli-docs
    source:
      - src/cli.rs
      - src/commands.rs
      - src/report.rs
      - flake.nix
    dependents:
      - README.md
      - www/index.html
      - skills/outdatty/SKILL.md
      - flake.lock

  # The rest of the implementation and its integration tests. A behaviour change
  # should prompt a look at the tests; a test-only edit stays ok (directed).
  - name: code
    source:
      - src/**/*.rs
    dependents:
      - tests/cli.rs

  # Dev tooling and standards; a change should be reflected in the contributor
  # guide and the CI that enforces it.
  - name: dev-standards
    source:
      - Justfile
      - clippy.toml
      - rustfmt.toml
      - rust-toolchain.toml
      - tarpaulin.toml
      - .linecop.yaml
    dependents:
      - CONTRIBUTING.md
      - .github/workflows/*.yml

  # A package change should be reflected in the changelog, and the lockfile in
  # the manifest.
  - name: release-notes
    source:
      - Cargo.toml
    dependents:
      - CHANGELOG.md
      - Cargo.lock
